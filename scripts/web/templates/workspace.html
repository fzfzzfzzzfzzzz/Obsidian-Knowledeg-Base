{% extends "base.html" %}
{% block title %}个人工作台 · 知识库{% endblock %}
{% block content %}

<header class="ws-header">
  <h1 class="ws-title">🏠 个人工作台</h1>
  <p class="ws-subtitle">你的 idea、时间线、活动和推荐文章，一站汇集。</p>
</header>

<!-- 今日一览:无框统计条(替代原来的四张统计卡) -->
<div class="stat-strip" id="ws-overview" aria-label="今日一览">
  <div class="ws-placeholder">加载中...</div>
</div>

<!-- 今日聚焦 / 时间线:更宽的主区,连续时间轴而非盒子网格 -->
<section class="card-soft ws-timeline-panel" aria-label="今日聚焦">
  <div class="block-head">
    <span class="block-icon">📅</span>
    <h2 class="block-title">今日聚焦 / 时间线</h2>
    <a class="block-more" href="/calendar">全部 →</a>
  </div>
  <div id="ws-timeline-body"><div class="ws-placeholder">加载中...</div></div>
</section>

<!-- 最近活动 / 推荐阅读:轻量双卡(无框感、靠留白与色块图标区分) -->
<div class="ws-twin">
  <section class="card-soft" aria-label="最近活动">
    <div class="block-head">
      <span class="block-icon">🔔</span>
      <h2 class="block-title">最近活动</h2>
      <a class="block-more" href="/recent">全部 →</a>
    </div>
    <div id="ws-activity-body"><div class="ws-placeholder">加载中...</div></div>
  </section>

  <section class="card-soft" aria-label="推荐阅读">
    <div class="block-head">
      <span class="block-icon">⭐</span>
      <h2 class="block-title">推荐阅读</h2>
      <a class="block-more" href="/kb">全部 →</a>
    </div>
    <div id="ws-recommend-body"><div class="ws-placeholder">加载中...</div></div>
  </section>
</div>

<!-- Idea 待审:横排小药丸,弱化卡片感 -->
<section class="card-soft" aria-label="Idea 待审">
  <div class="block-head">
    <span class="block-icon">💡</span>
    <h2 class="block-title">Idea 待审</h2>
    <a class="block-more" href="/ideas">全部 →</a>
  </div>
  <div id="ws-ideas-body"><div class="ws-placeholder">加载中...</div></div>
</section>

{% endblock %}
{% block scripts %}
<script>
// 个人工作台数据加载(独立 IIFE,与 app.js 解耦)
// 布局:无框统计条 + 宽时间轴主区 + 轻量双卡 + Idea 药丸条
// 全部复用现有 API,无新增后端端点。
(function(){
  'use strict';

  // ---- 工具 ----
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });}
  function setBody(id, html){
    var el = document.getElementById(id);
    if(el) el.innerHTML = html;
  }
  function emptyHTML(msg){ return '<div class="ws-placeholder">'+esc(msg)+'</div>'; }
  // 友好日期:今天/明天/昨天,否则 YYYY-MM-DD
  function fmtDate(d){
    if(!d) return '';
    var today = new Date(); today.setHours(0,0,0,0);
    var dt = new Date(d+'T00:00:00');
    var diff = Math.round((dt - today)/86400000);
    if(diff===0) return '今天';
    if(diff===1) return '明天';
    if(diff===-1) return '昨天';
    return d;
  }
  // 类别配色 / 图标(会议/财报/截止日期/发布/比赛/其他)
  var CAT_COLOR = {'会议':'#3b82f6','财报':'#16a34a','截止日期':'#dc2626','发布':'#8b5cf6','比赛':'#0d9488'};
  var CAT_ICON = {'会议':'📅','财报':'💰','截止日期':'⏰','发布':'🚀','比赛':'🏆'};

  // ---- 今日一览:无框统计条 ----
  function loadOverview(){
    Promise.all([
      fetch('/api/dashboard_full').then(function(r){return r.json();}).catch(function(){return {unread:[],read:[]};}),
      fetch('/api/ideas').then(function(r){return r.json();}).catch(function(){return {items:[]};})
    ]).then(function(res){
      var unread = (res[0].unread||[]).length;
      var read = (res[0].read||[]).length;
      var total = unread + read;
      var progress = total ? Math.round(read/total*100) : 0;
      var ideas = (res[1].items||[]).filter(function(x){return x.status==='pending_review';}).length;
      var html =
        '<div class="stat-strip-item stat-unread"><span class="stat-num">'+unread+'</span><span class="stat-label">未读</span></div>'
        + '<div class="stat-strip-sep"></div>'
        + '<div class="stat-strip-item stat-read"><span class="stat-num">'+read+'</span><span class="stat-label">已读</span></div>'
        + '<div class="stat-strip-sep"></div>'
        + '<div class="stat-strip-item stat-progress"><span class="stat-num">'+progress+'%</span><span class="stat-label">阅读进度</span></div>'
        + '<div class="stat-strip-sep"></div>'
        + '<div class="stat-strip-item"><span class="stat-num">'+ideas+'</span><span class="stat-label">Idea 待审</span></div>'
        + '<div class="stat-strip-progress"><div class="progress-bar-wrap"><div class="progress-bar" style="width:'+progress+'%"></div></div></div>';
      setBody('ws-overview', html);
    }).catch(function(){ setBody('ws-overview', '<div class="ws-placeholder">加载失败</div>'); });
  }

  // ---- 今日聚焦 / 时间线(日历项 + 事件,未来/今天起按日期升序,取 6 条) ----
  function loadTimeline(){
    Promise.all([
      fetch('/api/calendar').then(function(r){return r.json();}).catch(function(){return {items:[]};}),
      fetch('/api/events').then(function(r){return r.json();}).catch(function(){return {items:[]};})
    ]).then(function(res){
      var calItems = (res[0].items||[]).map(function(it){
        return {date:it.date, title:it.title, cat:it.category, href:it.event_id?('/events'):'/calendar', sub: it.source_title||''};
      });
      var evItems = (res[1].items||[]).filter(function(e){return e.status==='active';}).map(function(it){
        return {date:it.date, title:it.title, cat:it.category, href:'/events', sub:'事件'};
      });
      var all = calItems.concat(evItems);
      var todayStr = new Date().toISOString().slice(0,10);
      all = all.filter(function(x){return (x.date||'') >= todayStr;});
      all.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
      all = all.slice(0, 6);
      if(!all.length){ setBody('ws-timeline-body', emptyHTML('暂无即将到来的事项')); return; }
      var html = all.map(function(x){
        var c = CAT_COLOR[x.cat] || '#d97706';
        var icon = CAT_ICON[x.cat] || '📌';
        return '<div class="tl-item" style="--ev:'+c+'">'
          + '<span class="tl-item-icon">'+icon+'</span>'
          + '<div class="tl-item-body">'
            + '<a class="tl-item-title" href="'+esc(x.href)+'">'+esc(x.title)+'</a>'
            + '<div class="tl-item-meta">'+esc(fmtDate(x.date))+' · '+esc(x.sub||'')+'</div>'
          + '</div>'
          + '<span class="tl-item-cat" style="--ev:'+c+'">'+esc(x.cat||'其他')+'</span>'
        + '</div>';
      }).join('');
      setBody('ws-timeline-body', html);
    }).catch(function(){ setBody('ws-timeline-body', emptyHTML('加载失败')); });
  }

  // ---- 最近活动(最近阅读,取 5 条) ----
  function loadActivity(){
    fetch('/api/recent').then(function(r){return r.json();}).then(function(d){
      var items = (d.items||[]).slice(0,5);
      if(!items.length){ setBody('ws-activity-body', emptyHTML('还没有阅读记录')); return; }
      var html = items.map(function(x){
        return '<div class="ws-item"><div class="ws-item-main">'
          + '<a class="ws-item-title" href="/summary/'+esc(x.source_id)+'">'+esc(x.title||x.source_id)+'</a>'
          + '<div class="ws-item-sub">读过 '+(x.read_count||1)+' 次 · '+(x.area ? esc(x.area) : '')+'</div>'
        + '</div></div>';
      }).join('');
      setBody('ws-activity-body', html);
    }).catch(function(){ setBody('ws-activity-body', emptyHTML('加载失败')); });
  }

  // ---- 推荐阅读(最新未读,取 5 条) ----
  function loadRecommend(){
    fetch('/api/dashboard_full').then(function(r){return r.json();}).then(function(d){
      var items = (d.unread||[]).slice(0,5);
      if(!items.length){ setBody('ws-recommend-body', emptyHTML('没有未读文章,去 /kb 看全部')); return; }
      var html = items.map(function(x){
        var tags = (x.tags && x.tags.length) ? ' · '+x.tags.slice(0,3).map(esc).join(' ') : '';
        return '<div class="ws-item"><div class="ws-item-main">'
          + '<a class="ws-item-title" href="/summary/'+esc(x.source_id)+'">'+esc(x.title||x.source_id)+'</a>'
          + '<div class="ws-item-sub">'+(x.area ? esc(x.area) : '')+tags+'</div>'
        + '</div></div>';
      }).join('');
      setBody('ws-recommend-body', html);
    }).catch(function(){ setBody('ws-recommend-body', emptyHTML('加载失败')); });
  }

  // ---- Idea 待审(pending 队列,取 8 条,横排小药丸) ----
  function loadIdeas(){
    fetch('/api/ideas').then(function(r){return r.json();}).then(function(d){
      var items = (d.items||[]).filter(function(x){return x.status==='pending_review';}).slice(0,8);
      if(!items.length){ setBody('ws-ideas-body', emptyHTML('暂无待审 idea')); return; }
      var html = '<div class="idea-pills">'+items.map(function(x){
        var f = x.fields||{};
        var p = (f.priority||'').toLowerCase();
        var cls = (p.indexOf('高')>=0 || p==='p0' || p==='high') ? 'p-high'
                : (p.indexOf('低')>=0 || p==='p2' || p==='p3' || p==='low') ? 'p-low' : 'p-medium';
        var meta = [f.priority&&('P:'+f.priority), f.novelty&&('新颖:'+f.novelty)].filter(Boolean).join(' · ');
        return '<a class="idea-pill '+cls+'" href="/ideas" title="'+esc(meta)+'">'
          + '<span class="pill-dot"></span>'+esc(x.title||'(无标题)')+'</a>';
      }).join('')+'</div>';
      setBody('ws-ideas-body', html);
    }).catch(function(){ setBody('ws-ideas-body', emptyHTML('加载失败')); });
  }

  loadOverview();
  loadTimeline();
  loadActivity();
  loadRecommend();
  loadIdeas();
})();
</script>
{% endblock %}
