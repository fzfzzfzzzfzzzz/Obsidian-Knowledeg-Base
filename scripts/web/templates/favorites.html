{% extends "base.html" %}
{% block title %}收藏夹 · 知识库{% endblock %}
{% block content %}
<h1 class="page-title">⭐ 收藏夹</h1>
<p class="page-hint muted">你主动收藏的重要文章。点文章卡片或详情页的 ⭐ 按钮收藏。</p>
<div id="favorites-grid" class="card-grid">
  <div class="loading">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
  async function loadFavorites() {
    const grid = document.getElementById('favorites-grid');
    try {
      const res = await fetch('/api/favorites');
      const data = await res.json();
      if (!data.items || data.items.length === 0) {
        grid.innerHTML = '<div class="empty">还没有收藏。点文章卡片右上角的 ⭐ 加入收藏。</div>';
        return;
      }
      grid.innerHTML = data.items.map(item => renderArticleCard(item)).join('');
    } catch (e) {
      grid.innerHTML = `<div class="error">加载失败:${escapeHtml(e.message)}</div>`;
    }
  }
  loadFavorites();
</script>
{% endblock %}
