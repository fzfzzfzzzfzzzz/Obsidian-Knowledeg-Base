<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#030014">
  <title>{% block title %}知识库{% endblock %}</title>
  <script>
    // 防闪白:在 CSS / app.js 加载前尽早设好主题,避免整页刷新时先画出亮色底再切换。
    (function () {
      try {
        var t = localStorage.getItem('kb-theme') || 'dark'; // 默认暗色
      } catch (e) { var t = 'dark'; }
      if (t === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        // 同步给根元素一个暗色底色,即使样式表尚未到位也不会出现白屏
        document.documentElement.style.background = '#030014';
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css?v=49">
  <script src="/static/lucide.min.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">跳到主内容</a>

  <!-- 全站左侧边栏(主导航) -->
  <aside class="sidebar" id="sidebar" aria-label="主导航">
    <div class="sidebar-brand">
      <a href="/" class="nav-brand"><span class="brand-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>个人工作台</span></a>
      <button class="nav-close" id="navClose" aria-label="关闭导航菜单" aria-controls="sidebar"><i data-lucide="x"></i></button>
    </div>

    <nav class="sidebar-nav" id="navLinks" aria-label="主导航链接">
      <a href="/" class="sb-link {% if active_nav == 'index' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span>工作台</span></a>
      <a href="/kb" class="sb-link {% if active_nav in ('kb', 'search', 'articles', 'submit', 'recent') %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 17.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span><span>知识库</span></a>
      <a href="/favorites" class="sb-link {% if active_nav == 'favorites' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><span>收藏夹</span></a>
      <a href="/calendar" class="sb-link {% if active_nav == 'calendar' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span>日历</span></a>
      <a href="/ideas" class="sb-link {% if active_nav == 'ideas' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 2.5 1.5 4.5 3 6s2 2.5 2 4h4c0-1.5.5-2.5 2-4s3-3.5 3-6a7 7 0 0 0-7-7z"/></svg></span><span>Ideas</span></a>
      <a href="/todos" class="sb-link {% if active_nav == 'todos' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>Todos</span></a>
      <a href="/events" class="sb-link {% if active_nav == 'events' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4"/><path d="M4 4h12l-2 4 2 4H4V4z"/></svg></span><span>事件</span></a>
      <a href="/tasks" class="sb-link {% if active_nav == 'tasks' %}active{% endif %}"><span class="sb-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13l2 2 4-4"/></svg></span><span>任务</span></a>
    </nav>

    <div class="sidebar-foot">
      <div class="sidebar-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换浅色/暗色主题" title="切换主题"><i data-lucide="moon"></i></button>
        <button class="nav-shutdown" id="kbShutdownBtn" type="button"
                title="关闭知识库服务" aria-label="关闭知识库服务"><i data-lucide="power"></i></button>
      </div>
    </div>
  </aside>

  <div class="nav-overlay" id="navOverlay" hidden></div>

  <div class="app-main">
    <button class="nav-toggle" id="navToggle" aria-label="打开导航菜单" aria-expanded="false" aria-controls="sidebar"><i data-lucide="menu"></i></button>
    <main class="container" id="main">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Drawer 挂载点 -->
  <div class="drawer-overlay" id="drawerOverlay" hidden>
    <div class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" id="drawerBox">
      <div class="drawer-header">
        <h3 class="drawer-title" id="drawerTitle"></h3>
        <button class="drawer-close" id="drawerClose" aria-label="关闭抽屉"><i data-lucide="x"></i></button>
      </div>
      <div class="drawer-body" id="drawerBody"></div>
    </div>
  </div>

  <!-- Modal / Toast 挂载点 -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" id="modalBox">
      <h3 class="modal-title" id="modalTitle"></h3>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>
  <div class="toast-wrap" id="toastWrap" aria-live="polite" aria-atomic="false"></div>

  <script src="/static/app.js?v=37"></script>
  <script>
  // 关闭知识库服务(独立脚本,与 app.js 解耦,不影响业务逻辑)
  (function(){
    var btn = document.getElementById('kbShutdownBtn');
    if(!btn) return;
    btn.addEventListener('click', function(){
      if(!confirm('确定关闭知识库服务?\n\n关闭后请重新双击桌面图标启动。')) return;
      btn.disabled = true;
      btn.textContent = '…';
      // fire-and-forget:服务进程会立即退出,fetch 多半会失败,忽略即可
      fetch('/api/shutdown', {method:'POST'}).catch(function(){});
      setTimeout(function(){
        document.title = '知识库已关闭';
        document.body.innerHTML =
          '<div style="text-align:center;padding:4rem 1rem;font-family:sans-serif;color:#555">'
          + '<h2>🔌 知识库服务已关闭</h2>'
          + '<p>可关闭此标签页,需要时双击桌面图标重新启动。</p></div>';
      }, 800);
    });
  })();
  </script>
  <script>
  // Lucide 图标:页面加载时渲染一次;暴露 refreshIcons() 供 app.js 动态渲染后调用
  window.refreshIcons = function(){
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  };
  window.refreshIcons();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
