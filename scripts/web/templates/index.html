{% extends "base.html" %}
{% block title %}仪表盘 · 知识库{% endblock %}
{% block content %}

<div id="stats-overview" class="stats-overview">
  <div class="loading">加载中...如果长时间停留在此处,按 F12 看控制台报错。</div>
</div>

<section id="section-unread" class="dashboard-section">
  <h2 class="section-title">📘 未读文章 <span class="count-badge" id="count-unread"></span></h2>
  <div id="grid-unread" class="card-grid"><div class="loading">加载中...</div></div>
</section>

<section id="section-read" class="dashboard-section">
  <h2 class="section-title">✅ 已读文章 <span class="count-badge" id="count-read"></span></h2>
  <div id="grid-read" class="card-grid"><div class="loading">加载中...</div></div>
</section>

<section class="dashboard-section">
  <h2 class="section-title">📖 稍后阅读 <span class="count-badge" id="count-read-later"></span></h2>
  <div id="grid-read-later" class="card-grid"><div class="loading">加载中...</div></div>
</section>

{% endblock %}
{% block scripts %}
<script>
  // 全局错误捕获,把报错显示到页面而不是静默吞掉
  window.addEventListener('error', function(e) {
    const ov = document.getElementById('stats-overview');
    if (ov) ov.innerHTML = '<div class="error">JS 错误:' + escapeHtml(e.message) + ' (行 ' + (e.lineno||'?') + ')</div>';
  });

  async function loadDashboard() {
    const overview = document.getElementById('stats-overview');
    try {
      const res = await fetch('/api/dashboard');
      if (!res.ok) throw new Error('API 返回 ' + res.status);
      const d = await res.json();
      const s = d.stats || {};

      // 统计概览:4 个数字卡片 + 进度条
      overview.innerHTML = `
        <div class="stat-cards">
          <div class="stat-card stat-unread">
            <div class="stat-num">${s.unread}</div>
            <div class="stat-label">未读</div>
          </div>
          <div class="stat-card stat-read">
            <div class="stat-num">${s.read}</div>
            <div class="stat-label">已读</div>
          </div>
          <div class="stat-card stat-total">
            <div class="stat-num">${s.total}</div>
            <div class="stat-label">总计</div>
          </div>
          <div class="stat-card stat-progress">
            <div class="stat-num">${s.progress}%</div>
            <div class="stat-label">进度</div>
          </div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" style="width:${s.progress}%"></div>
        </div>
      `;

      // 稍后读列表
      renderSection('grid-read-later', 'count-read-later', d.read_later, '还没有稍后阅读的文章。在文章详情页点 📖 加入。');

      // 加载未读/已读列表(独立请求)
      loadUnreadRead();
    } catch (e) {
      overview.innerHTML = '<div class="error">加载失败:' + escapeHtml(e.message) + '</div>';
    }
  }

  // 加载未读/已读文章卡片(复用 /api/summaries,按 reading_status 过滤)
  async function loadUnreadRead() {
    try {
      const res = await fetch('/api/dashboard_full');
      let data;
      if (res.ok) {
        data = await res.json();
      } else {
        // 后备:用 summaries API
        const r2 = await fetch('/api/summaries');
        const d2 = await r2.json();
        data = {unread: d2.items, read: []};
      }
      renderSection('grid-unread', 'count-unread', data.unread, '没有未读文章,全部已读 🎉');
      renderSection('grid-read', 'count-read', data.read, '还没有已读文章。打开文章详情会自动标记为已读。');
    } catch (e) {
      document.getElementById('grid-unread').innerHTML = '<div class="error">加载失败:' + escapeHtml(e.message) + '</div>';
    }
  }

  function renderSection(gridId, countId, items, emptyMsg) {
    const grid = document.getElementById(gridId);
    const count = document.getElementById(countId);
    count.textContent = items.length;
    if (!items || items.length === 0) {
      grid.innerHTML = '<div class="empty">' + emptyMsg + '</div>';
      return;
    }
    grid.innerHTML = items.map(function(item) {
      return typeof renderArticleCard === 'function'
        ? renderArticleCard(item)
        : '<div class="card"><h3>' + escapeHtml(item.title || item.source_id) + '</h3></div>';
    }).join('');
  }

  loadDashboard();
</script>
{% endblock %}
