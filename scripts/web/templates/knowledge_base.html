{% extends "base.html" %}
{% block title %}知识库{% endblock %}
{% block content %}

<div id="batch-bar" class="batch-bar" style="display:none;">
  <span class="batch-info">已选 <strong id="batch-count">0</strong> 篇</span>
  <button class="btn btn-sm" onclick="batchAction('archive')">📦 归档</button>
  <button class="btn btn-sm btn-accept" onclick="batchAction('favorite')">⭐ 收藏</button>
  <button class="btn btn-sm" onclick="batchAction('unfavorite')">取消收藏</button>
  <button class="btn btn-sm" onclick="batchAction('add_tags')">🏷 加标签</button>
  <button class="btn btn-sm" onclick="batchAction('extract_suggestions')">💡 抽 idea/todo</button>
  <button class="btn btn-sm" onclick="batchAction('generate_summary')">📝 生成 summary</button>
  <button class="btn btn-sm btn-danger" onclick="batchAction('delete')">🗑 删除</button>
  <button class="btn btn-sm btn-ghost" onclick="clearSelection()">取消选择</button>
</div>

<div class="home-search-bar">
  <form action="/search" method="get" class="search-form">
    <input type="text" name="q" placeholder="搜索文章标题、摘要、标签..." class="search-input" aria-label="搜索">
    <button type="submit" class="btn btn-primary">搜索</button>
  </form>
</div>

<div id="stats-overview" class="stats-overview">
  <div class="loading">加载中...如果长时间停留在此处,按 F12 看控制台报错。</div>
</div>

<div class="tab-bar" role="tablist" aria-label="文章分组">
  <button class="tab active" data-tab="unread" role="tab" aria-selected="true">📘 未读 <span class="count-badge" id="count-unread"></span></button>
  <button class="tab" data-tab="read" role="tab" aria-selected="false">✅ 已读 <span class="count-badge" id="count-read"></span></button>
  <button class="tab" data-tab="readlater" role="tab" aria-selected="false">📖 稍后阅读 <span class="count-badge" id="count-read-later"></span></button>
</div>

<section class="tab-panel active" id="panel-unread" role="tabpanel">
  <div id="grid-unread" class="card-grid selectable"></div>
  <button class="btn show-more" data-tab="unread" style="display:none">显示更多</button>
</section>

<section class="tab-panel" id="panel-read" role="tabpanel">
  <div id="grid-read" class="card-grid selectable"></div>
  <button class="btn show-more" data-tab="read" style="display:none">显示更多</button>
</section>

<section class="tab-panel" id="panel-readlater" role="tabpanel">
  <div id="grid-readlater" class="card-grid selectable"></div>
  <button class="btn show-more" data-tab="readlater" style="display:none">显示更多</button>
</section>

{% endblock %}
{% block scripts %}
<script>
  // 全局错误捕获,把报错显示到页面而不是静默吞掉
  window.addEventListener('error', function (e) {
    const ov = document.getElementById('stats-overview');
    if (ov) ov.innerHTML = '<div class="error">JS 错误:' + escapeHtml(e.message) + ' (行 ' + (e.lineno || '?') + ')</div>';
  });

  initDashboard();
</script>
{% endblock %}
