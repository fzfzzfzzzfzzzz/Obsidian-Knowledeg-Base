{% extends "base.html" %}
{% block title %}任务详情 · 知识库{% endblock %}
{% block content %}
<div id="task-detail-root" class="task-detail">
  <div class="loading">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
// 任务详情页:加载 + 渲染 + checklist 单项打勾
const TK_DETAIL_STATUS = {
  'active':   { color: '#2563eb', label: '进行中', icon: 'play' },
  'done':     { color: '#16a34a', label: '已完成', icon: 'check' },
  'blocked':  { color: '#dc2626', label: '阻塞', icon: 'ban' },
  'archived': { color: '#64748b', label: '已归档', icon: 'archive' },
};
const TK_DETAIL_CAT = { '开发':'#2563eb','调研':'#16a34a','写作':'#8b5cf6','阅读':'#0d9488','整理':'#d97706','其他':'#64748b' };
const TASK_ID = "{{ task_id }}";
const tkTodayStr = new Date().toISOString().slice(0, 10);

async function loadTaskDetail() {
  const root = document.getElementById('task-detail-root');
  try {
    const r = await fetch('/api/tasks/' + encodeURIComponent(TASK_ID));
    if (!r.ok) {
      root.innerHTML = '<div class="error">加载失败(' + r.status + ')</div>';
      return;
    }
    const t = await r.json();
    window._taskData = t;
    renderDetail(t);
  } catch(e) {
    root.innerHTML = '<div class="error">加载失败:' + escapeHtml(e.message) + '</div>';
  }
}

function fmtDateLabel(d) {
  if (!d) return '';
  try {
    const dt = new Date(d + 'T00:00:00');
    const today = new Date(tkTodayStr + 'T00:00:00');
    const diff = Math.round((dt - today) / 86400000);
    if (diff === 0) return '今天';
    if (diff === 1) return '明天';
    if (diff === -1) return '昨天';
    return d;
  } catch(e) { return d; }
}

function renderDetail(t) {
  const sm = TK_DETAIL_STATUS[t.status] || { color: '#64748b', label: t.status, icon: '•' };
  const dl = t.deadline;
  const dlOverdue = dl && dl < tkTodayStr;
  const dlToday = dl && dl === tkTodayStr;
  const dlClass = dlOverdue ? 'td-dl-overdue' : (dlToday ? 'td-dl-today' : '');
  const clItems = t.checklist || [];
  const clDone = clItems.filter(x => x.done).length;
  const clPct = clItems.length ? Math.round(clDone / clItems.length * 100) : 0;
  const clHtml = clItems.length
    ? clItems.map(it => checklistDetailRow(it)).join('')
    : '<div class="td-cl-empty muted">暂无子任务</div>';
  const catColor = (TK_DETAIL_CAT[t.category] || '#64748b');

  // 元数据条(只显示有值的)
  const meta = [];
  if (t.project) meta.push({ icon: 'folder', label: '项目', val: t.project });
  if (t.priority) meta.push({ icon: 'tag', label: '优先级', val: t.priority });
  if (t.created_at) meta.push({ icon: 'clock', label: '创建', val: t.created_at.slice(0, 10) });
  if (t.updated_at && t.updated_at !== t.created_at) meta.push({ icon: 'pencil', label: '更新', val: t.updated_at.slice(0, 10) });
  const metaHtml = meta.length
    ? '<div class="td-meta-grid">' + meta.map(m =>
        '<div class="td-meta-item"><span class="td-meta-label"><i data-lucide="'+m.icon+'"></i> ' + escapeHtml(m.label) + '</span><span class="td-meta-val">' + escapeHtml(m.val) + '</span></div>'
      ).join('') + '</div>'
    : '';

  // 截止日期徽章
  const dlBadge = dl
    ? '<span class="td-deadline-badge ' + dlClass + '">'
        + (dlOverdue ? '<i data-lucide="triangle-alert"></i> 已逾期 · ' : (dlToday ? '<i data-lucide="alarm-clock"></i> 今天 · ' : '<i data-lucide="calendar"></i> ')) + escapeHtml(fmtDateLabel(dl)) + ' (' + escapeHtml(dl) + ')'
      + '</span>'
    : '';

  // 阻塞提示
  const blockerHtml = t.blocker
    ? '<div class="td-blocker"><span class="td-blocker-icon"><i data-lucide="ban"></i></span><div><div class="td-blocker-label">当前问题 / 阻塞</div><div class="td-blocker-text">' + escapeHtml(t.blocker) + '</div></div></div>'
    : '';

  // 正文(服务端渲染好的 html_body)
  const bodyHtml = t.html_body
    ? '<section class="td-section"><h3 class="td-section-title"><i data-lucide="file-text"></i> 详细描述</h3><div class="td-body markdown-body">' + t.html_body + '</div></section>'
    : '';

  document.getElementById('task-detail-root').innerHTML =
    '<a href="/tasks" class="td-back"><i data-lucide="arrow-left"></i> 返回任务列表</a>'
    + '<article class="td-card" style="--td-status:'+sm.color+';--td-cat:'+catColor+'">'
      + '<header class="td-card-head">'
        + '<div class="td-badges">'
          + '<span class="td-status-badge" style="background:'+sm.color+'"><i data-lucide="'+sm.icon+'"></i> ' + escapeHtml(sm.label) + '</span>'
          + '<span class="td-cat-tag">' + escapeHtml(t.category) + '</span>'
          + dlBadge
        + '</div>'
        + '<h1 class="td-title">'+escapeHtml(t.title)+'</h1>'
        + '<div class="td-actions">'
          + '<a class="btn btn-sm btn-primary" href="/task/'+encodeURIComponent(TASK_ID)+'/edit"><i data-lucide="pencil"></i> 编辑</a>'
          + (dl ? '<button class="btn btn-sm" id="td-sync"><i data-lucide="calendar"></i> 同步到日历</button>' : '')
          + '<button class="btn btn-sm btn-danger" id="td-delete"><i data-lucide="trash-2"></i> 删除</button>'
        + '</div>'
      + '</header>'
      + metaHtml
      + blockerHtml
      + '<section class="td-section td-checklist-section">'
        + '<div class="td-section-head">'
          + '<h3 class="td-section-title"><i data-lucide="check-square"></i> Checklist <span class="td-prog-muted">'+clDone+' / '+clItems.length+'</span></h3>'
          + (clItems.length ? '<span class="td-prog-pct">'+clPct+'%</span>' : '')
        + '</div>'
        + (clItems.length ? '<div class="td-prog-bar"><div class="td-prog-fill" style="width:'+clPct+'%"></div></div>' : '')
        + '<div class="td-checklist" id="td-checklist">'+clHtml+'</div>'
      + '</section>'
      + bodyHtml
    + '</article>';

  // 绑定 checklist 打勾
  document.querySelectorAll('#td-checklist .cl-toggle').forEach(cb => {
    cb.onchange = function() { toggleChecklistItem(this.dataset.itemId, this.checked, this); };
  });
  // 同步/删除按钮
  const syncBtn = document.getElementById('td-sync');
  if (syncBtn) syncBtn.onclick = syncDetailTask;
  document.getElementById('td-delete').onclick = deleteDetailTask;
  if (window.refreshIcons) window.refreshIcons();  // 动态渲染后重新扫描 Lucide 图标
}

function checklistDetailRow(it) {
  return '<label class="td-cl-item">'
    + '<input type="checkbox" class="cl-toggle" data-item-id="'+escapeHtml(it.id)+'" '+(it.done?'checked':'')+'>'
    + '<span class="td-cl-text'+(it.done?' td-cl-done':'')+'">'+escapeHtml(it.text)+'</span>'
  + '</label>';
}

async function toggleChecklistItem(itemId, done, cbEl) {
  try {
    const r = await fetch('/api/tasks/'+TASK_ID+'/checklist/'+encodeURIComponent(itemId), {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({done: done})
    });
    if (!r.ok) throw new Error('更新失败');
    // 就地更新文本样式 + 进度条(不整页重渲染,避免打断)
    const span = cbEl.parentElement.querySelector('.td-cl-text');
    if (span) span.classList.toggle('td-cl-done', done);
    updateChecklistProgress();
  } catch(e) {
    cbEl.checked = !done;  // 回滚
    toast(e.message);
  }
}

function updateChecklistProgress() {
  const items = document.querySelectorAll('#td-checklist .cl-toggle');
  if (!items.length) return;
  const done = Array.from(items).filter(cb => cb.checked).length;
  const total = items.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const muted = document.querySelector('.td-prog-muted');
  if (muted) muted.textContent = done + ' / ' + total;
  const pctEl = document.querySelector('.td-prog-pct');
  if (pctEl) pctEl.textContent = pct + '%';
  const fill = document.querySelector('.td-prog-fill');
  if (fill) fill.style.width = pct + '%';
}

async function syncDetailTask() {
  const btn = document.getElementById('td-sync');
  btn.disabled = true; btn.textContent = '同步中...';
  try {
    const r = await fetch('/api/tasks/'+TASK_ID+'/sync-calendar', {method:'POST'});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '失败');
    toast(d.reason === 'already_synced' ? '已同步过' : '已同步到日历', 'success');
    btn.textContent = '📅 已同步';
  } catch(e) {
    toast(e.message); btn.disabled = false; btn.textContent = '📅 同步到日历';
  }
}

async function deleteDetailTask() {
  if (!await confirmModal('确定删除此任务?此操作不可撤销。', {title:'删除任务', confirmText:'删除', danger:true})) return;
  try {
    const r = await fetch('/api/tasks/'+TASK_ID, {method:'DELETE'});
    if (!r.ok) throw new Error('删除失败');
    toast('已删除', 'success');
    setTimeout(() => location.href = '/tasks', 600);
  } catch(e) { toast(e.message); }
}

loadTaskDetail();
</script>
{% endblock %}
