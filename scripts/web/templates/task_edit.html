{% extends "base.html" %}
{% block title %}编辑任务 · 知识库{% endblock %}
{% block content %}
<div id="task-edit-root" class="task-edit">
  <div class="loading">加载中...</div>
</div>
{% endblock %}
{% block scripts %}
<script>
// 任务全页编辑器:加载已有任务 → 宽敞表单 → PATCH 保存 → 返回详情页
const TASK_ID = "{{ task_id }}";

async function loadTask() {
  const root = document.getElementById('task-edit-root');
  try {
    const r = await fetch('/api/tasks/' + encodeURIComponent(TASK_ID));
    if (!r.ok) { root.innerHTML = '<div class="error">加载失败(' + r.status + ')</div>'; return; }
    const t = await r.json();
    renderForm(t);
  } catch (e) {
    root.innerHTML = '<div class="error">加载失败:' + escapeHtml(e.message) + '</div>';
  }
}

const TK_STATUS_LABEL = { active: '进行中', done: '已完成', blocked: '阻塞', archived: '已归档' };

function renderForm(t) {
  const clInit = (t.checklist || []).map(x => Object.assign({}, x));
  const clHtml = clInit.length ? clInit.map(it => checklistRow(it)).join('') : ''
    + '<div class="cl-empty muted" style="display:' + (clInit.length ? 'none' : 'block') + '">暂无子任务</div>';
  document.getElementById('task-edit-root').innerHTML =
    '<a href="/task/' + encodeURIComponent(TASK_ID) + '" class="back-link">← 返回详情</a>'
    + '<h1 class="page-title"><i data-lucide="pencil"></i> 编辑任务</h1>'
    + '<div class="task-edit-form">'
      + '<div class="te-field">'
        + '<label>标题 <span class="required">*</span></label>'
        + '<input type="text" id="te-title" class="search-input te-title-input" value="' + escapeHtml(t.title) + '" maxlength="200">'
      + '</div>'
      + '<div class="te-row2">'
        + '<div class="te-field"><label>所属项目</label><input id="te-project" class="search-input" placeholder="例如 AAAI-27" value="' + escapeHtml(t.project || '') + '"></div>'
        + '<div class="te-field"><label>分类</label><select id="te-category" class="search-input">'
          + ['开发', '科研', '个人', '金融', '其他'].map(c => '<option' + (c === t.category ? ' selected' : '') + '>' + c + '</option>').join('')
        + '</select></div>'
      + '</div>'
      + '<div class="te-row2">'
        + '<div class="te-field"><label>状态</label><select id="te-status" class="search-input">'
          + ['active', 'done', 'blocked', 'archived'].map(s => '<option value="' + s + '"' + (s === t.status ? ' selected' : '') + '>' + (TK_STATUS_LABEL[s] || s) + '</option>').join('')
        + '</select></div>'
        + '<div class="te-field"><label>当前问题/阻塞</label><input id="te-blocker" class="search-input" placeholder="卡在哪里?" value="' + escapeHtml(t.blocker || '') + '"></div>'
      + '</div>'
      + '<div class="te-row2">'
        + '<div class="te-field"><label>截止日期</label><input id="te-deadline" type="date" class="search-input" value="' + escapeHtml(t.deadline || '') + '"></div>'
      + '</div>'
      + '<div class="te-field">'
        + '<label>详细描述</label>'
        + '<textarea id="te-body" class="search-input te-body-input" rows="5" placeholder="详细记录这个任务的背景、思路、进展、笔记…（支持 Markdown）">' + escapeHtml(t.body && t.body !== '（暂无描述）' ? t.body : '') + '</textarea>'
      + '</div>'
      + '<div class="te-field">'
        + '<label>Checklist 子任务</label>'
        + '<div id="te-checklist" class="cl-list">' + clHtml + '</div>'
        + '<button class="btn btn-sm btn-secondary" id="te-add-cl" type="button"><i data-lucide="plus"></i> 添加子任务</button>'
      + '</div>'
      + '<div class="te-actions">'
        + '<a class="btn btn-ghost" href="/task/' + encodeURIComponent(TASK_ID) + '">取消</a>'
        + '<button class="btn btn-primary" id="te-save" type="button"><i data-lucide="save"></i> 保存</button>'
      + '</div>'
    + '</div>';

  document.getElementById('te-add-cl').onclick = addChecklistRow;
  document.getElementById('te-save').onclick = saveTask;
  bindChecklistEvents();  // 删除按钮的事件委托
  // Ctrl/Cmd+S 快捷保存
  document.addEventListener('keydown', teOnKeydown);
  if (window.refreshIcons) window.refreshIcons();  // 动态渲染后重新扫描 Lucide 图标
}

function teOnKeydown(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    const btn = document.getElementById('te-save');
    if (btn && !btn.disabled) btn.click();
  }
}

// ---- Checklist 子任务编辑器(事件委托,不依赖 inline handler)----
// 数据源是 DOM 本身:保存时从输入框现读,避免外部状态与 DOM 不同步。
function checklistRow(it) {
  return '<div class="cl-row">'
    + '<input type="checkbox" class="cl-done"' + (it.done ? ' checked' : '') + '>'
    + '<input type="text" class="cl-text search-input" value="' + escapeHtml(it.text || '') + '" placeholder="子任务内容">'
    + '<button class="icon-btn icon-btn-danger te-cl-del" type="button" title="删除"><i data-lucide="x"></i></button>'
  + '</div>';
}
function renderChecklistEditor() {
  const wrap = document.getElementById('te-checklist');
  if (!wrap) return;
  const cl = collectChecklist();
  wrap.innerHTML = (cl.length ? cl.map(it => checklistRow(it)).join('') : '')
    + '<div class="cl-empty muted" style="display:' + (cl.length ? 'none' : 'block') + '">暂无子任务</div>';
  if (window.refreshIcons) window.refreshIcons();
}
function addChecklistRow() {
  // 先保留当前已输入的内容(避免新增时丢失),再追加一个空行
  const cl = collectChecklist();
  cl.push({ id: 'cli_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), text: '', done: false });
  const wrap = document.getElementById('te-checklist');
  wrap.innerHTML = cl.map(it => checklistRow(it)).join('')
    + '<div class="cl-empty muted" style="display:none">暂无子任务</div>';
  if (window.refreshIcons) window.refreshIcons();
  // 聚焦到新增的最后一个输入框,方便直接输入
  const inputs = wrap.querySelectorAll('.cl-text');
  if (inputs.length) inputs[inputs.length - 1].focus();
}
// 从 DOM 现读 checklist(每行 checkbox + 文本),保留已有 id
function collectChecklist() {
  const wrap = document.getElementById('te-checklist');
  if (!wrap) return [];
  const rows = wrap.querySelectorAll('.cl-row');
  const out = [];
  rows.forEach(row => {
    const cb = row.querySelector('.cl-done');
    const txt = row.querySelector('.cl-text');
    out.push({
      id: row.dataset.cli || ('cli_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
      text: txt ? txt.value : '',
      done: cb ? cb.checked : false,
    });
  });
  return out;
}
// 事件委托:删除按钮 / 新增按钮(在 renderForm 里绑定 te-add-cl)
function bindChecklistEvents() {
  const wrap = document.getElementById('te-checklist');
  if (wrap) {
    wrap.addEventListener('click', function(e) {
      const del = e.target.closest('.te-cl-del');
      if (!del) return;
      const row = del.closest('.cl-row');
      if (row) { row.remove(); syncClEmpty(); }
    });
  }
}
function syncClEmpty() {
  const wrap = document.getElementById('te-checklist');
  if (!wrap) return;
  const empty = wrap.querySelector('.cl-empty');
  if (empty) empty.style.display = wrap.querySelectorAll('.cl-row').length ? 'none' : 'block';
}

async function saveTask() {
  const btn = document.getElementById('te-save');
  const title = document.getElementById('te-title').value.trim();
  if (!title) { toast('标题不能为空', 'error'); return; }
  const payload = {
    title,
    project: document.getElementById('te-project').value,
    category: document.getElementById('te-category').value,
    status: document.getElementById('te-status').value,
    deadline: document.getElementById('te-deadline').value,
    blocker: document.getElementById('te-blocker').value,
    body: document.getElementById('te-body').value,
    checklist: collectChecklist().filter(x => x.text && x.text.trim()),
  };
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const r = await fetch('/api/tasks/' + encodeURIComponent(TASK_ID), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || '保存失败');
    toast('✓ 已保存', 'success');
    // 返回详情页
    setTimeout(() => location.href = '/task/' + encodeURIComponent(TASK_ID), 400);
  } catch (e) {
    toast('保存失败:' + e.message, 'error');
    btn.disabled = false; btn.textContent = '💾 保存';
  }
}

loadTask();
</script>
{% endblock %}
